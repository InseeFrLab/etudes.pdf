title: Inforap Typst
author: SSER
version: 1.1.0

contributes:
  formats:
    typst:
      # Indispensable : Quarto utilise ces fichiers pour construire le rendu
      template-partials:
        - typst-template.typ
        - typst-show.typ
      
      # Options de rendu
      keep-typ: true           # Garde le .typ pour debugger si besoin
      mainfont: "Marianne"      # Utilise la police Insee si présente sur le PC
      fontsize: 10pt
      
      # On déclare les variables que Quarto doit passer au template
      variables:
        logo_sser_header: resources/images/logo_sser_header.png
        logo_fr_path: resources/images/logo_republique_francaise.png
        logo_sser_footer: resources/images/logo_sser_header.png
        logo_download: resources/images/logo_download.png

      # On s'assure que Quarto embarque bien tout ton dossier resources
      format-resources:
        - resources/